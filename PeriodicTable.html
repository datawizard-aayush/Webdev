  <div id="info-box">
    <div id="info-content">
      <img id="element-image" src="" alt="Element Image">
      <div>
        <h3 id="element-title"></h3>
        <p id="element-summary"></p>
        <a id="element-link" href="#" target="_blank">Read more on Wikipedia</a>
      </div>
    </div>
  </div>
  
  <script>
    async function fetchElementInfo(elementName) {
      const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${elementName}`);
      const data = await response.json();
  
      if (data.extract) {
        document.getElementById("element-title").textContent = data.title;
        document.getElementById("element-summary").textContent = data.extract;
        document.getElementById("element-link").href = data.content_urls.desktop.page;
        document.getElementById("element-image").src = data.thumbnail?.source || "";
        document.getElementById("element-image").style.display = data.thumbnail ? "block" : "none";
        document.getElementById("info-box").style.display = "block";
      } else {
        document.getElementById("element-title").textContent = "Not found";
        document.getElementById("element-summary").textContent = "No information found on Wikipedia.";
        document.getElementById("element-link").href = "#";
        document.getElementById("element-image").style.display = "none";
        document.getElementById("info-box").style.display = "block";
      }
    }
  
    document.querySelectorAll(".table button").forEach(button => {
      button.addEventListener("click", () => {
        const skip = ["Element", "Alkaline_earth", "Transition", "Non_metals", "Chalcogens", "Halogens", "Noble", "Metalloids", "p_metals", "Lanthanides", "Actinides", "Lanthanidesbutton", "Actinidesbutton"];
        const classes = Array.from(button.classList);
        const elementClass = classes.find(c => !skip.includes(c));
  
        if (elementClass) {
          fetchElementInfo(elementClass);
        }
      });
    });
  </script>
